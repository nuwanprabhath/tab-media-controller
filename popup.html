<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 100px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      background: #1e1e2e;
      overflow-y: auto;
    }

    .header {
      padding: 12px 16px;
      background: #181825;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #cdd6f4;
    }

    .header .shortcut {
      margin-left: auto;
      font-size: 11px;
      color: #6c7086;
      background: #313244;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: #6c7086;
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.5;
    }

    .tab-list {
      list-style: none;
    }

    .tab-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
      border-bottom: 1px solid #313244;
      transition: background 0.15s;
    }

    .tab-item:hover {
      background: #313244;
    }

    .tab-item:last-child {
      border-bottom: none;
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .tab-info {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      color: #cdd6f4;
    }

    .tab-url {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
      color: #6c7086;
      margin-top: 2px;
    }

    .tab-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      position: relative;
    }

    .btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #313244;
      color: #cdd6f4;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .btn:hover::after {
      opacity: 1;
    }

    .btn-toggle {
      background: #6366f1;
      color: white;
    }

    .btn-toggle:hover {
      background: #818cf8;
      transform: scale(1.05);
    }

    .btn-toggle.paused {
      background: #45475a;
    }

    .btn-toggle.paused:hover {
      background: #585b70;
    }

    .btn-toggle svg {
      width: 16px;
      height: 16px;
    }

    .btn-close {
      background: transparent;
      color: #6c7086;
    }

    .btn-close:hover {
      background: #f38ba8;
      color: white;
      transform: scale(1.05);
    }

    .btn-close svg {
      width: 14px;
      height: 14px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.playing {
      background: #a6e3a1;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-dot.paused {
      background: #6c7086;
    }

    .status-dot.unknown {
      background: #f9e2af;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .loading {
      padding: 24px;
      text-align: center;
      color: #6c7086;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Media Controller</h1>
    <span class="shortcut">Alt+P</span>
  </div>
  <div id="content">
    <div class="loading">Scanning tabs...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
